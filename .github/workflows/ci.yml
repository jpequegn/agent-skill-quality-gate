name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --locked --no-editable --dev
      - run: uv run --no-sync ruff check .
      - run: uv run --no-sync pytest
